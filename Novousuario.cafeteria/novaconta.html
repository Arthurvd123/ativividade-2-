<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nova conta na Good Coffee</title>
    <link rel="stylesheet" href="novaconta.css">
</head>
<body>

<header>
    <h1>Nova conta na Good Coffee</h1>
</header>

<div class="principal">

    <div class="logo">
        <div class="xicara">☕</div>
    </div>

    <div class="formulario">

        <h2>Criar Conta</h2>

        <p>Preencha seus dados necessarios para criar a sua conta</p>

        <label>Nome Completo</label>
        <input type="text" placeholder="Digite seu nome completo">

        <label>Email</label>
        <input type="email" placeholder="Digite seu email">

        <label>Telefone</label>
        <input type="telefone" placeholder="(00) 00000-0000">

        <label>Senha</label>
        <input type="senha" placeholder="Digite sua senha">

        <label>Confirmar Senha</label>
        <input type="senha" placeholder="Confirme sua senha">

        <button>Criar Conta</button>

    </div>

</div>

<footer>
    <p>2026 - Anny Maia, Arthur Velasquez e Davi Passos</p>
    <a href="index.html">Página Inicial</a>
</footer>

</body>
</html>
